name: Spring Boot CI with SonarCloud & ACR

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Azure Login using OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Build application and run SonarCloud analysis
      - name: Build and SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.token=${SONAR_TOKEN}

      # Login to Azure Container Registry
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR-LOGIN-SERVER }}
          username: ${{ secrets.ACR-USERNAME }}
          password: ${{ secrets.ACR-PASSWORD }}

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR-LOGIN-SERVER }}/spring-boot-app:latest .

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push \
            ${{ secrets.ACR-LOGIN-SERVER }}/spring-boot-app:latest
